<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121214">
<title>Mantenimiento RC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#121214;color:#e1e1e6;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
body{overflow-x:hidden}
.screen{display:none;padding:16px 16px 80px;max-width:480px;margin:0 auto}
.screen.active{display:block}

/* HEADER */
.header{text-align:center;padding:env(safe-area-inset-top,20px) 0 16px;padding-top:calc(env(safe-area-inset-top,0px) + 20px);border-bottom:1px solid #222228;margin-bottom:24px}
.header h1{font-size:20px;font-weight:700;color:#f97316;letter-spacing:0.2px}
.header p{font-size:13px;color:#6b7280;margin-top:4px}

/* INPUT */
.input-group{margin-bottom:18px}
.input-group label{display:block;font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.input-group input{width:100%;background:#1c1c1f;border:1px solid #2a2a2e;border-radius:12px;padding:14px 16px;font-size:17px;color:#f5f5f5;outline:none;-webkit-appearance:none;appearance:none}
.input-group input:focus{border-color:#f97316;background:#1f1c19}
.input-group input::placeholder{color:#4b5563}

/* MENU BUTTONS */
.menu-btn{display:flex;align-items:center;gap:16px;width:100%;background:#1c1c1f;border:1px solid #2a2a2e;border-radius:16px;padding:18px 16px;cursor:pointer;text-align:left;margin-bottom:12px;-webkit-appearance:none}
.menu-btn:active{background:#222228;transform:scale(0.98)}
.menu-btn .ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ico-orange{background:#431407}
.ico-blue{background:#0c1a3a}
.menu-btn .btn-text .title{font-size:16px;font-weight:600;color:#f5f5f5}
.menu-btn .btn-text .sub{font-size:13px;color:#6b7280;margin-top:3px}
.menu-btn .chevron{margin-left:auto;font-size:18px;color:#4b5563;flex-shrink:0}

/* TYPE SELECTOR */
.section-label{font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.type-btn{background:#1c1c1f;border:1px solid #2a2a2e;border-radius:12px;padding:14px 8px 12px;cursor:pointer;text-align:center;transition:all 0.15s;-webkit-appearance:none}
.type-btn:active{transform:scale(0.95)}
.type-btn .ticon{font-size:24px;display:block;margin-bottom:6px}
.type-btn .tlabel{font-size:12px;font-weight:600;color:#9ca3af}
.type-btn .tsub{font-size:10px;color:#4b5563;margin-top:2px}
.type-btn.sel-o{background:#431407;border-color:#f97316}
.type-btn.sel-o .tlabel{color:#fb923c}
.type-btn.sel-b{background:#0c1a3a;border-color:#3b82f6}
.type-btn.sel-b .tlabel{color:#60a5fa}
.type-btn.sel-g{background:#052e16;border-color:#22c55e}
.type-btn.sel-g .tlabel{color:#4ade80}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.progress-bar{flex:1;height:5px;background:#2a2a2e;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}
.progress-label{font-size:12px;color:#6b7280;white-space:nowrap;min-width:36px;text-align:right}

/* SECTIONS */
.section-block{background:#1c1c1f;border:1px solid #2a2a2e;border-radius:14px;margin-bottom:12px;overflow:hidden}
.section-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.section-title{font-size:13px;font-weight:700;letter-spacing:0.2px}
.section-arrow{font-size:14px;color:#6b7280;transition:transform 0.2s;display:inline-block}
.section-arrow.open{transform:rotate(180deg)}
.section-body{display:none;padding:12px;border-top:1px solid #222228;flex-direction:column;gap:8px}
.section-body.open{display:flex}

/* TASKS */
.task-item{display:flex;align-items:flex-start;gap:12px;background:#121214;border:1px solid #222228;border-radius:10px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s}
.task-item:active{opacity:0.7}
.task-item.checked{opacity:0.45}
.task-check{width:22px;height:22px;border-radius:6px;border:1.5px solid #374151;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all 0.15s;color:#fff}
.task-title{font-size:13px;font-weight:600;color:#f5f5f5;margin-bottom:4px;line-height:1.3}
.task-desc{font-size:12px;color:#6b7280;line-height:1.5}

/* BUTTONS */
.btn-primary{width:100%;background:#f97316;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;-webkit-appearance:none;transition:opacity 0.15s}
.btn-primary:active{opacity:0.8}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn-ghost{width:100%;background:transparent;border:1px solid #2a2a2e;border-radius:13px;padding:14px;font-size:15px;font-weight:500;color:#9ca3af;cursor:pointer;margin-top:10px;-webkit-appearance:none;transition:background 0.15s}
.btn-ghost:active{background:#1c1c1f}
.btn-wa{display:flex;width:100%;background:#128c7e;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;-webkit-appearance:none;align-items:center;justify-content:center;gap:8px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.btn-wa:active{opacity:0.8}
.btn-danger{width:100%;background:transparent;border:1px solid #7f1d1d;border-radius:13px;padding:14px;font-size:14px;font-weight:500;color:#ef4444;cursor:pointer;margin-top:10px;-webkit-appearance:none}
.btn-danger:active{background:#1a0909}

/* HISTORIAL */
.rev-card{background:#1c1c1f;border:1px solid #2a2a2e;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rev-card:active{background:#222228}
.rev-car{font-size:15px;font-weight:700;color:#f5f5f5}
.rev-meta{font-size:12px;color:#6b7280;margin-top:3px}
.rev-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:7px;margin-top:8px}
.badge-o{background:#431407;color:#fb923c}
.badge-b{background:#0c1a3a;color:#60a5fa}
.badge-g{background:#052e16;color:#4ade80}
.rev-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.rev-prog-bar{flex:1;height:4px;background:#2a2a2e;border-radius:2px;overflow:hidden;margin-right:10px}
.rev-prog-fill{height:100%;border-radius:2px}
.rev-prog-txt{font-size:11px;color:#6b7280}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:#4b5563}
.empty .eico{font-size:40px;margin-bottom:14px}
.empty p{font-size:14px;line-height:1.6}

/* DETAIL */
.detail-header{background:#1c1c1f;border:1px solid #2a2a2e;border-radius:14px;padding:16px;margin-bottom:16px}
.detail-car{font-size:18px;font-weight:700;color:#f5f5f5}
.detail-meta{font-size:12px;color:#6b7280;margin-top:4px}
.detail-section{margin-bottom:16px}
.detail-sec-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;padding-left:2px}
.detail-task{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#1c1c1f;border:1px solid #222228;border-radius:9px;margin-bottom:6px}
.detail-ck{font-size:15px;flex-shrink:0;margin-top:1px}
.detail-name{font-size:13px;line-height:1.4}

/* BACK */
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;padding:4px 0;width:fit-content}
.back-row span{font-size:16px;font-weight:600;color:#f97316}
.back-arrow{font-size:18px;color:#f97316}
</style>
</head>
<body>

<!-- MENÚ -->
<div id="s-menu" class="screen active">
  <div class="header">
    <h1>🔧 Mantenimiento RC</h1>
    <p>HSP App created by Juanitohijo</p>
  </div>
  <div class="input-group">
    <label>Nombre del coche</label>
    <input id="car-input" type="text" placeholder="ej. HSP Azul, Monster 1…" maxlength="40" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button class="menu-btn" onclick="goRevision()">
    <div class="ico ico-orange">🛠️</div>
    <div class="btn-text">
      <div class="title">Hacer revisión</div>
      <div class="sub">Registrar nueva sesión</div>
    </div>
    <span class="chevron">›</span>
  </button>
  <button class="menu-btn" onclick="goHistorial()">
    <div class="ico ico-blue">📋</div>
    <div class="btn-text">
      <div class="title">Consultar revisiones</div>
      <div class="sub">Ver historial guardado</div>
    </div>
    <span class="chevron">›</span>
  </button>
</div>

<!-- REVISIÓN -->
<div id="s-revision" class="screen">
  <div class="header">
    <h1>🛠️ Nueva revisión</h1>
    <p id="rev-car-lbl">—</p>
  </div>
  <div class="section-label">Tipo de revisión</div>
  <div class="type-grid">
    <button class="type-btn" id="tb-basic" onclick="selectType('basic')">
      <span class="ticon">⏱️</span>
      <span class="tlabel">Básica</span>
      <div class="tsub">Tras cada uso</div>
    </button>
    <button class="type-btn" id="tb-normal" onclick="selectType('normal')">
      <span class="ticon">🔍</span>
      <span class="tlabel">Normal</span>
      <div class="tsub">Cada 5–8 cargas</div>
    </button>
    <button class="type-btn" id="tb-full" onclick="selectType('full')">
      <span class="ticon">🔩</span>
      <span class="tlabel">Completa</span>
      <div class="tsub">Puesta a punto</div>
    </button>
  </div>
  <div id="progress-row" class="progress-row" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <span class="progress-label" id="prog-lbl">0 / 0</span>
  </div>
  <div id="tasks-container"></div>
  <button class="btn-primary" id="save-btn" onclick="saveRevision()" disabled>Guardar revisión</button>
  <button class="btn-ghost" onclick="goMenu()">← Volver al menú</button>
</div>

<!-- HISTORIAL -->
<div id="s-historial" class="screen">
  <div class="header">
    <h1>📋 Historial</h1>
    <p>Revisiones guardadas</p>
  </div>
  <div id="historial-list"></div>
  <button class="btn-ghost" onclick="goMenu()">← Volver al menú</button>
</div>

<!-- DETALLE -->
<div id="s-detail" class="screen">
  <div class="back-row" onclick="goHistorial()">
    <span class="back-arrow">‹</span>
    <span>Historial</span>
  </div>
  <div id="detail-content"></div>
</div>

<!-- MODAL CONFIRMAR BORRAR -->
<div id="confirm-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;padding:24px">
  <div style="background:#1c1c1f;border:1px solid #2a2a2e;border-radius:16px;padding:24px;width:100%;max-width:320px">
    <div style="font-size:16px;font-weight:700;color:#f5f5f5;margin-bottom:8px">Eliminar revisión</div>
    <div style="font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5">Esta acción no se puede deshacer. ¿Seguro que quieres eliminarla?</div>
    <button id="confirm-ok" style="width:100%;background:#ef4444;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:10px">Sí, eliminar</button>
    <button id="confirm-cancel" style="width:100%;background:transparent;border:1px solid #2a2a2e;border-radius:11px;padding:13px;font-size:15px;font-weight:500;color:#9ca3af;cursor:pointer">Cancelar</button>
  </div>
</div>

<script>
var TASKS = {
  basic:{
    color:'#f97316', selClass:'sel-o', badge:'badge-o', icon:'⏱️', label:'Básica — Tras cada uso',
    sections:[{id:'g1', title:'1. Básico — Tras cada uso', tasks:[
      {id:'1.1', title:'Limpieza con Aire a Presión', desc:'Retira la carrocería y aplica aire a presión por todo el chasis para expulsar polvo, tierra suelta y arena de las articulaciones. Evita apuntar directo a los rodamientos a corta distancia.'},
      {id:'1.2', title:'Inspección del Cardán y Corona', desc:'Gira las ruedas con la mano y comprueba que no hayan entrado piedrecitas en la corona central ni en el piñón. Asegúrate de que no haya cables rozando el eje central.'},
      {id:'1.3', title:'Desconexión y Voltaje LiPo', desc:'Desconecta la batería. Comprueba en el SkyRC T6X80 que las celdas no hayan bajado de 3.4V. Si vas a estar más de 3 días sin rodar, activa modo LiPo STORAGE (3.8V/celda).'},
      {id:'1.4', title:'Revisión Térmica y Apagado', desc:'Verifica que motor y variador no quemen al tacto. Apaga la emisora FlySky siempre DESPUÉS de haber apagado y desconectado el coche.'}
    ]}]
  },
  normal:{
    color:'#3b82f6', selClass:'sel-b', badge:'badge-b', icon:'🔍', label:'Normal — Cada 5–8 cargas',
    sections:[{id:'g2', title:'2. Normal — Cada 5–8 cargas', tasks:[
      {id:'2.1', title:'Reapriete de Tornillería Crítica', desc:'Revisa tornillos en piezas de aluminio (torres de suspensión, soportes de trapecios). Si alguno ha cogido holgura, limpia y aplica fijatornillos azul 243.'},
      {id:'2.2', title:'Comprobación de Amortiguadores', desc:'Presiona el chasis hacia el suelo y suéltalo. El coche debe recuperar altura de inmediato de forma homogénea y sin rebotes secos. Si "rasca" o ha perdido recorrido, tiene fugas o burbujas de aire.'},
      {id:'2.3', title:'Inspección de Neumáticos y Llantas', desc:'Revisa líneas de pegado con cianoacrilato. Si el torque del motor 3200Kv ha despegado algún labio, limpia la zona y aplica pegamento Ptarmigan para evitar que destalone en carrera.'},
      {id:'2.4', title:'Limpieza del Ventilador del Motor', desc:'Desmonta la tapa del ventilador YSIDO. Retira briznas de hierba o polvo que bloqueen las aspas para asegurar el máximo enfriamiento del motor 3660.'}
    ]}]
  },
  full:{
    color:'#22c55e', selClass:'sel-g', badge:'badge-g', icon:'🔩', label:'Completa — Puesta a punto radical',
    sections:[{id:'g3', title:'3. Completo — Puesta a punto radical', tasks:[
      {id:'3.1', title:'Reconstrucción de Amortiguadores', desc:'Vacía el aceite viejo. Limpia el interior con papel de taller. Verifica que los vástagos no estén doblados. Rellena con 450 cSt delante y 500 cSt detrás, purgando todo el aire.'},
      {id:'3.2', title:'Apertura y Renovación de Diferenciales', desc:'Abre las cajas puente y extrae los diferenciales 4WD. Limpia la grasa vieja con alcohol isopropílico. Rellena los satélites con grasa negra de molibdeno y engrasa coronas con grasa de litio.'},
      {id:'3.3', title:'Mantenimiento de Rodamientos', desc:'Extrae los rodamientos de las manguetas. Comprueba si giran finos. Si están atascados, límpialos sumergiéndolos en desengrasante y aplica una gota de aceite fino de alta velocidad.'},
      {id:'3.4', title:'Ajuste de la Holgura de Dirección', desc:'Revisa el conjunto del salvaservos y rótulas del servo JX de 21kg. Si los tirantes han cogido juego, reajusta con las tuercas de rosca inversa y verifica la geometría (−1.5° Camber delante / −2° detrás).'}
    ]}]
  }
};

var INCLUDES = {basic:['basic'], normal:['basic','normal'], full:['basic','normal','full']};
var state = {carName:'', type:null, checks:{}};

function loadState(){
  try{
    var s = localStorage.getItem('rc_app_state');
    if(s){ var d=JSON.parse(s); state.carName=d.carName||''; }
  }catch(e){}
  document.getElementById('car-input').value = state.carName;
  document.getElementById('car-input').addEventListener('input', function(){
    state.carName = this.value.trim();
    saveState();
  });
}

function saveState(){
  try{ localStorage.setItem('rc_app_state', JSON.stringify({carName:state.carName})); }catch(e){}
}

function getRevs(){
  try{ return JSON.parse(localStorage.getItem('rc_revisions')||'[]'); }catch(e){ return []; }
}

function setRevs(arr){
  try{ localStorage.setItem('rc_revisions', JSON.stringify(arr)); }catch(e){}
}

function showScreen(id){
  var all = document.querySelectorAll('.screen');
  for(var i=0;i<all.length;i++) all[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goMenu(){
  state.type=null; state.checks={};
  document.getElementById('car-input').value = state.carName;
  showScreen('s-menu');
}

function goRevision(){
  state.carName = document.getElementById('car-input').value.trim();
  saveState();
  document.getElementById('rev-car-lbl').textContent = state.carName || 'Sin nombre';
  state.type=null; state.checks={};
  document.getElementById('tasks-container').innerHTML='';
  document.getElementById('progress-row').style.display='none';
  document.getElementById('save-btn').disabled=true;
  ['tb-basic','tb-normal','tb-full'].forEach(function(id){
    document.getElementById(id).className='type-btn';
  });
  showScreen('s-revision');
}

function selectType(t){
  state.type=t; state.checks={};
  var map = {basic:'sel-o', normal:'sel-b', full:'sel-g'};
  document.getElementById('tb-basic').className='type-btn'+(t==='basic'?' sel-o':'');
  document.getElementById('tb-normal').className='type-btn'+(t==='normal'?' sel-b':'');
  document.getElementById('tb-full').className='type-btn'+(t==='full'?' sel-g':'');
  renderTasks();
}

function renderTasks(){
  var types = INCLUDES[state.type];
  var col = TASKS[state.type].color;
  var container = document.getElementById('tasks-container');
  container.innerHTML='';

  types.forEach(function(type){
    var tdef = TASKS[type];
    tdef.sections.forEach(function(sec){
      var block = document.createElement('div');
      block.className='section-block';
      var head = document.createElement('div');
      head.className='section-head';
      head.innerHTML='<span class="section-title" style="color:'+col+'">'+sec.title+'</span><span class="section-arrow open" id="arr-'+sec.id+'">▼</span>';
      head.onclick = (function(sid){ return function(){ toggleSec(sid); }; })(sec.id);
      block.appendChild(head);
      var body = document.createElement('div');
      body.className='section-body open';
      body.id='body-'+sec.id;
      sec.tasks.forEach(function(task){
        var el = document.createElement('div');
        el.className='task-item';
        el.id='ti-'+task.id;
        el.innerHTML='<div class="task-check" id="ck-'+task.id+'"></div><div><div class="task-title">'+task.id+' — '+task.title+'</div><div class="task-desc">'+task.desc+'</div></div>';
        el.onclick = (function(tid, c){ return function(){ toggleTask(tid, c); }; })(task.id, col);
        body.appendChild(el);
      });
      block.appendChild(body);
      container.appendChild(block);
    });
  });
  document.getElementById('progress-row').style.display='flex';
  document.getElementById('prog-fill').style.background=col;
  updateProgress();
}

function toggleSec(sid){
  var body = document.getElementById('body-'+sid);
  var arr = document.getElementById('arr-'+sid);
  var open = body.classList.contains('open');
  body.classList.toggle('open',!open);
  arr.classList.toggle('open',!open);
}

function toggleTask(id, col){
  state.checks[id] = !state.checks[id];
  var ck = document.getElementById('ck-'+id);
  var ti = document.getElementById('ti-'+id);
  if(state.checks[id]){
    ck.textContent='✓';
    ck.style.background=col;
    ck.style.borderColor=col;
    ti.classList.add('checked');
  } else {
    ck.textContent='';
    ck.style.background='';
    ck.style.borderColor='#374151';
    ti.classList.remove('checked');
  }
  updateProgress();
}

function updateProgress(){
  var types = INCLUDES[state.type]||[];
  var total=0, done=0;
  types.forEach(function(t){
    TASKS[t].sections.forEach(function(s){
      s.tasks.forEach(function(task){
        total++;
        if(state.checks[task.id]) done++;
      });
    });
  });
  var pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent=done+' / '+total;
  document.getElementById('save-btn').disabled = (done===0);
}

function saveRevision(){
  var types = INCLUDES[state.type];
  var tasks = [];
  types.forEach(function(t){
    TASKS[t].sections.forEach(function(s){
      s.tasks.forEach(function(task){
        tasks.push({id:task.id, title:task.title, done:!!state.checks[task.id]});
      });
    });
  });
  var done = tasks.filter(function(t){return t.done;}).length;
  var rev = {
    id: Date.now(),
    car: state.carName || 'Sin nombre',
    type: state.type,
    date: new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}),
    time: new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
    tasks: tasks,
    done: done,
    total: tasks.length
  };
  var revs = getRevs();
  revs.unshift(rev);
  setRevs(revs);
  state.checks={};
  state.type=null;
  alert('✅ Revisión guardada correctamente');
  goHistorial();
}

function goHistorial(){
  var revs = getRevs();
  var list = document.getElementById('historial-list');
  list.innerHTML='';
  if(revs.length===0){
    list.innerHTML='<div class="empty"><div class="eico">📋</div><p>No hay revisiones guardadas todavía.<br>¡Haz tu primera revisión!</p></div>';
  } else {
    revs.forEach(function(r){
      var tdef = TASKS[r.type];
      var pct = r.total>0 ? Math.round(r.done/r.total*100) : 0;
      var card = document.createElement('div');
      card.className='rev-card';
      card.innerHTML='<div class="rev-car">'+r.car+'</div>'+
        '<div class="rev-meta">'+r.date+' · '+r.time+'</div>'+
        '<span class="rev-badge '+tdef.badge+'">'+tdef.icon+' '+tdef.label+'</span>'+
        '<div class="rev-card-footer">'+
          '<div class="rev-prog-bar"><div class="rev-prog-fill" style="width:'+pct+'%;background:'+tdef.color+'"></div></div>'+
          '<span class="rev-prog-txt">'+r.done+'/'+r.total+'</span>'+
        '</div>';
      card.onclick = (function(rev){ return function(){ goDetail(rev); }; })(r);
      list.appendChild(card);
    });
  }
  showScreen('s-historial');
}

function goDetail(rev){
  var tdef = TASKS[rev.type];
  var col = tdef.color;
  var pct = rev.total>0 ? Math.round(rev.done/rev.total*100) : 0;

  var html = '<div class="detail-header">'+
    '<div class="detail-car">'+rev.car+'</div>'+
    '<div class="detail-meta">'+rev.date+' · '+rev.time+'</div>'+
    '<span class="rev-badge '+tdef.badge+'" style="margin-top:8px;display:inline-block">'+tdef.icon+' '+tdef.label+'</span>'+
    '<div class="progress-row" style="margin-top:12px;margin-bottom:0">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<span class="progress-label">'+rev.done+' / '+rev.total+'</span>'+
    '</div></div>';

  var grouped={};
  rev.tasks.forEach(function(t){
    var s=t.id.split('.')[0];
    if(!grouped[s]) grouped[s]=[];
    grouped[s].push(t);
  });
  var secTitles={'1':'Básica','2':'Normal','3':'Completa'};
  Object.keys(grouped).sort().forEach(function(sec){
    html+='<div class="detail-section"><div class="detail-sec-title">'+(secTitles[sec]||'Sección '+sec)+'</div>';
    grouped[sec].forEach(function(t){
      var ck = t.done ? '<span style="color:'+col+'">✓</span>' : '<span style="color:#374151">○</span>';
      var nc = t.done ? '#d1d5db' : '#6b7280';
      html+='<div class="detail-task"><span class="detail-ck">'+ck+'</span><span class="detail-name" style="color:'+nc+'">'+t.id+' — '+t.title+'</span></div>';
    });
    html+='</div>';
  });

  html+='<a class="btn-wa" id="wa-link-btn" href="#" onclick="return shareWA('+rev.id+',this)">📲 Enviar por WhatsApp</a>';
  html+='<button class="btn-danger" onclick="deleteRev('+rev.id+')">Eliminar revisión</button>';
  html+='<div style="height:16px"></div>';

  document.getElementById('detail-content').innerHTML=html;
  showScreen('s-detail');
}

function buildMsg(rev){
  var tdef = TASKS[rev.type];
  var lines = [
    '🔧 *Revisión RC — '+rev.car+'*',
    '📅 '+rev.date+' · '+rev.time,
    '📊 Tipo: '+tdef.label,
    '✅ Completadas: '+rev.done+'/'+rev.total,
    ''
  ];
  var grouped={};
  rev.tasks.forEach(function(t){
    var s=t.id.split('.')[0];
    if(!grouped[s]) grouped[s]=[];
    grouped[s].push(t);
  });
  var secTitles={'1':'Básica','2':'Normal','3':'Completa'};
  Object.keys(grouped).sort().forEach(function(sec){
    lines.push('*'+( secTitles[sec]||'Sección '+sec)+'*');
    grouped[sec].forEach(function(t){
      lines.push((t.done?'✅':'⬜')+' '+t.id+' '+t.title);
    });
    lines.push('');
  });
  lines.push('_Enviado desde app Mantenimiento RC_');
  return lines.join('\n');
}

function shareWA(id, el){
  var revs = getRevs();
  var rev = null;
  for(var i=0;i<revs.length;i++){ if(revs[i].id===id){ rev=revs[i]; break; } }
  if(!rev) return false;
  var msg = encodeURIComponent(buildMsg(rev));
  var waUrl = 'whatsapp://send?text='+msg;
  var webUrl = 'https://wa.me/?text='+msg;
  if(el){ el.href = waUrl; }
  window.location.href = waUrl;
  setTimeout(function(){
    var now = Date.now();
    if(document.hidden || (Date.now()-now)<100) return;
    window.location.href = webUrl;
  }, 1200);
  return false;
}

function deleteRev(id){
  var overlay = document.getElementById('confirm-overlay');
  overlay.style.display='flex';
  document.getElementById('confirm-ok').onclick = function(){
    overlay.style.display='none';
    var revs = getRevs().filter(function(r){ return r.id!==id; });
    setRevs(revs);
    goHistorial();
  };
  document.getElementById('confirm-cancel').onclick = function(){
    overlay.style.display='none';
  };
}

loadState();
</script>
</body>
</html>
